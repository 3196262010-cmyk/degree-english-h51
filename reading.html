const ARTS = [{"no": 1, "title": "The Value of Lifelong Learning", "body": "In today's rapidly changing world, the concept of lifelong learning has become more important than ever. Unlike traditional education, which ends when a person leaves school, lifelong learning refers to the continuous development of skills and knowledge throughout a person's entire life. Many experts argue that the modern job market demands this kind of commitment to ongoing education. Technologies change, industries evolve, and new challenges emerge. A worker who stops learning after finishing university may find that their skills become outdated within a decade. In contrast, someone who actively seeks new knowledge adapts more easily to change and remains competitive in their field. Lifelong learning does not have to take place in a formal classroom. It can happen through reading books, attending online courses, joining professional workshops, or even learning from daily work experiences. The key is to maintain a curious and open mindset. Research has shown that people who engage in regular learning activities also benefit emotionally. They report higher levels of life satisfaction and a stronger sense of purpose. Furthermore, learning new skills can improve memory and reduce the risk of cognitive decline in later life. In conclusion, lifelong learning is not just a career strategy; it is a way of living that brings both professional and personal rewards.", "sentences": ["In today's rapidly changing world, the concept of lifelong learning has become more important than ever.", "Unlike traditional education, which ends when a person leaves school, lifelong learning refers to the continuous development of skills and knowledge throughout a person's entire life.", "Many experts argue that the modern job market demands this kind of commitment to ongoing education.", "Technologies change, industries evolve, and new challenges emerge.", "A worker who stops learning after finishing university may se of purpose", "C": "It makes people more popular among friends", "D": "It helps people sleep better"}, "ans": "?"}, {"no": 5, "stem": "What is the main purpose of this passage?", "opts": {"A": "To criticize the traditional education system", "B": "To explain why universities are not important", "C": "To argue that lifelong learning benefits both career and personal life", "D": "To describe different types of online learning platforms\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 2, "title": "The Importance of Regular Physical Exercise", "body": "Regular physical exercise is widely recognized as one of the most effective ways to maintain good health. Doctors and health professionals around the world recommend that adults engage in at least 150 minutes of moderate exercise per week. Despite this advice, many people still fail to meet this basic requirement due to busy schedules, lack of motivation, or limited access to sports facilities. The benefits of exercise extend far beyond simply losing weight. Physical activity strengthens the heart and lungs, reduces the risk of serious diseases such as diabetes, high blood pressure, and certain types of cancer, and improves the functioning of the immune system. People who exercise regularly also tend to sleep better and have more energy throughout the day. Mental health benefits are equally significant. Exercise triggers the release of chemicals called endorphins in the brain, which create feelings of happiness and reduce feelings of anxiety and depression. Studies have found that regular physical activity can be as effective as medication for treating mild to moderate depression. Starting an exercise routine does not require expensive equipment or a gym membership. Walking, cycling, swimming, and even household chores can all contribute to a healthy level of physical activity. The most important step is simply to get started and make movement a regular part of daily life. Maintaining an active lifestyle is a long-term investment in health. Small, consistent efforts over time lead to significant improvements in both physical and mental well-being.", "sentences": ["Regular physical exercise is widely recognized as one of the most effective ways to maintain good health.", "Doctors and health professionals around the world recommend that adults engage in at least 150 minutes of moderate exercise per week.", "Despite this advice, many people still fail to meet this basic requirement due to busy schedules, lack of motivation, or limited access to sports facilities.", "The benefits of exercise extend far beyond simply losing weight.", "Physical activity strengthens the heart and lungs, reduces the risk of serious diseases such as diabetes, high blood pressure, and certain types of cancer, and improves the functioning of the immune system.", "People who exercise regularly also tend to sleep better and have more energy throughout the day.", "Mental health benefits are equally significant.", "Exercise triggers the release of chemicals called endorphins in the brain, which create feelings of happiness and reduce feelings of anxiety and depression.", "Studies have found that regular physical activity can be as effective as medication for treating mild to moderate depression.", "Starting an exercise routine does not require expensive equipment or a gym membership.", "Walking, cycling, swimming, and even household chores can all contribute to a healthy level of physical activity.", "The most important step is simply to get started and make movement a regular part of daily life.", "Maintaining an active lifestyle is a long-term investment in health.", "Small, consistent efforts over time lead to significant improvements in both physical and mental well-being."], "questions": [{"no": 1, "stem": "What is the minimum weekly exercise recommendation for adults?", "opts": {"A": "100 minutes", "B": "120 minutes", "C": "150 minutes", "D": "200 minutes"}, "ans": "C"}, {"no": 2, "stem": "Which of the following is NOT mentioned as a physical benefit of exercise?", "opts": {"A": "Reduced risk of diabetes", "B": "Better sleep quality", "C": "Improved vision", "D": "Stronger\nimmune system"}, "ans": "?"}, {"no": 3, "stem": "How does exercise affect mental health?", "opts": {"A": "It makes people feel tired and calm", "B": "It releases endorphins that improve mood and reduce anxiety", "C": "It increases the need for medication", "D": "It causes people to sleep too much"}, "ans": "?"}, {"no": 4, "stem": "What does the passage say about starting an exercise routine?", "opts": {"A": "It requires expensive gym equipment", "B": "It needs a personal trainer", "C": "It can begin with simple activities like walking", "D": "It must follow a strict scientific plan"}, "ans": "?"}, {"no": 5, "stem": "What is the tone of this passage?", "opts": {"A": "Pessimistic", "B": "Informative and encouraging", "C": "Critical", "D": "Humorous\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 3, "title": "Artificial Intelligence in Everyday Life", "body": "Artificial intelligence, or AI, has moved from the realm of science fiction into the everyday lives of billions of people. From smart alarm clocks that adjust to our sleep patterns, to recommendation systems that suggest videos or products, AI quietly shapes our daily experiences. One of the most visible applications of AI is in virtual assistants such as Siri and Alexa. These tools can answer questions, set reminders, play music, and control smart home devices. For many users, they have become indispensable for managing daily tasks. In healthcare, AI is making significant contributions. Systems powered by AI can analyze medical images with accuracy that rivals trained doctors. AI tools are also being used to predict disease outbreaks, personalize treatment plans, and improve hospital operations. However, the rise of AI also raises important concerns. Privacy is a major issue, as AI systems often rely on collecting and analyzing large amounts of personal data. There are also worries about job displacement, as some roles previously performed by humans are increasingly automated. Despite these challenges, most experts agree that AI, when used responsibly, has the potential to solve some of humanity's greatest problems and improve quality of life globally.", "sentences": ["Artificial intelligence, or AI, has moved from the realm of science fiction into the everyday lives of billions of people.", "From smart alarm clocks that adjust to our sleep patterns, to recommendation systems that suggest videos or products, AI quietly shapes our daily experiences.", "One of the most visible applications of AI is in virtual assistants such as Siri and Alexa.", "These tools can answer questions, set reminders, play music, and control smart home devices.", "For many users, they have become indispensable for managing daily tasks.", "In healthcare, AI is making significant contributions.", "Systems powered by AI can analyze medical images with accuracy that rivals trained doctors.", "AI tools are also being used to predict disease outbreaks, personalize treatment plans, and improve hospital operations.", "However, the rise of AI also raises important concerns.", "Privacy is a major issue, as AI systems often rely on collecting and analyzing large amounts of personal data.", "There are also worries about job displacement, as some roles previously performed by humans are increasingly automated.", "Despite these challenges, most experts agree that AI, when used responsibly, has the potential to solve some of humanity's greatest problems and improve quality of life globally."], "questions": [{"no": 1, "stem": "According to the passage, how has AI changed in recent years?", "opts": {"A": "It has moved from everyday life back into science fiction", "B": "It has shifted from science fiction into everyday use", "C": "It is only used by technology companies", "D": "It has become less relevant to ordinary people"}, "ans": "B"}, {"no": 2, "stem": "What can virtual assistants like Siri and Alexa do?", "opts": {"A": "Only play music", "B": "Replace medical doctors", "C": "Perform tasks such as setting reminders and controlling smart devices", "D": "Write and edit documents automatically"}, "ans": "?"}, {"no": 3, "stem": "What is AI's role in healthcare?", "opts": {"A": "Replacing all doctors in hospitals", "B": "Providing free medical treatment worldwide", "C": "Analyzing images and predicting disease outbreaks", "D": "Managing insurance claims"}, "ans": "?"}, {"no": 4, "stem": "What concern about AI is mentioned in the passage?", "opts": {"A": "AI systems are unreliable", "B": "Privacy issues due to large-scale data collection", "C": "AI is too expensive for most countries", "D": "AI cannot process data quickly enough"}, "ans": "?"}, {"no": 5, "stem": "What is the author's overall attitude toward AI?", "opts": {"A": "AI is dangerous and should be banned", "B": "AI has no real benefits", "C": "AI is promising but must be used responsibly", "D": "AI will definitely replace all human workers\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 4, "title": "Effective Time Management in the Workplace", "body": "Time management is one of the most valued skills in any professional environment. Employees who organize their workload efficiently tend to be more productive, less stressed, and more successful in achieving career goals. One common mistake is multitasking. While handling several tasks at once might seem efficient, research consistently shows that multitasking reduces efficiency and increases errors. Focusing on one task at a time leads to better quality outcomes. Setting priorities is another essential strategy. Not all tasks are equally urgent or important. Tools such as to-do lists and planning software help workers identify which tasks need immediate attention. The Eisenhower Matrix divides tasks into four categories based on l pressure on residents. Noise, pollution, and a fast-paced lifestyle add to the stress many city dwellers experience. Rural life tends to be quieter and closer to nature. People in rural areas often enjoy lower living costs, cleaner air, and stronger community bonds. Many describe a sense of peace and freedom that is hard to find in cities. The drawbacks include fewer job opportunities, limited access to certain services and educational resources, and sometimes a feeling of isolation. In recent years, technology has begun to change this picture. Remote work made possible by improved internet connectivity allows some professionals to live in rural areas while keeping city-level careers. This trend suggests the gap between urban and rural living may narrow in the future.", "sentences": ["The choice between city living and rural life is one many people face.", "Both offer unique advantages and disadvantages, and the best choice depends largely on individual priorities and circumstances.", "Urban life offers unmatched convenience.", "Cities provide hospitals, universities, shopping centers, and extensive public transportation.", "Career opportunities are generally more abundant, making cities attractive to young professionals.", "However, city life comes with high costs.", "Housing prices, transportation expenses, and the general cost of living can place enormous financial pressure on residents.", "Noise, pollution, and a fast-paced lifestyle add to the stress many city dwellers experience.", "Rural life tends to be quieter and closer to nature.", "People in rural areas often enjoy lower living costs, cleaner air, and stronger community bonds.", "Many describe a sense of peace and freedom that is hard to find in cities.", "The drawbacks include fewer job opportunities, limited access to certain services and educational resources, and sometimes a feeling of isolation.", "In recent years, technology has begun to change this picture.", "Remote work made possible by improved internet connectivity allows some professionals to live in rural areas while keeping city-level careers.", "This trend suggests the gap between urban and rural living may narrow in the future."], "questions": [{"no": 1, "stem": "What is one major advantage of urban life according to the passage?", "opts": {"A": "Lower cost of living", "B": "Cleaner air", "C": "Greater career opportunities", "D": "Stronger\ncommunity"}, "ans": "C"}, {"no": 2, "stem": "What is a disadvantage of city living mentioned in the passage?", "opts": {"A": "Fewer hospitals", "B": "High cost of living", "C": "Lack of entertainment", "D": "No public\ntransport"}, "ans": "?"}, {"no": 3, "stem": "Which of the following is an advantage of rural life?", "opts": {"A": "More job opportunities", "B": "Better universities", "C": "Lower living costs", "D": "Faster\ninternet access"}, "ans": "?"}, {"no": 4, "stem": "What recent development has reduced the urban-rural divide?", "opts": {"A": "New highways connecting cities and villages", "B": "Remote work enabled by improved internet", "C": "Rural areas building large shopping centers", "D": "Government programs relocating city workers"}, "ans": "?"}, {"no": 5, "stem": "What is the main message of the passage?", "opts": {"A": "Rural life is always better than urban life", "B": "Urban life suits everyone", "C": "Both lifestyles have pros and cons depending on personal needs", "D": "Technology will make everyone move to the countryside\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 6, "title": "The Importance of Cultural Diversity", "body": "Cultural diversity refers to the variety of human societies and cultures that exist in the world, each with its own unique set of values, traditions, and ways of life. In an increasingly globalized world, understanding and appreciating cultural differences has become more important than ever before. One of the most significant benefits of cultural diversity is the richness it brings to social and intellectual life. When people from different backgrounds work together, they bring different perspectives and approaches to problem-solving. This variety of viewpoints can lead to more creative solutions and better outcomes for businesses and communities alike. However, cultural diversity also presents challenges. Misunderstandings between people from different cultures are common, often arising from differences in communication styles, values, or social norms. For example, what is considered polite behavior in one culture may be seen as rude in another. Language barriers can also make communication difficult, even when people share similar goals. Education plays a key role in helping people navigate cultural differences. Schools and workplaces that teach cultural awareness and sensitivity help reduce prejudice and discrimination. Programs that encourage cross-cultural exchange, such as student exchange initiatives and international internships, allow people to develop a first-hand appreciation of different ways of life. In conclusion, while cultural diversity can be challenging to navigate, it ultimately enriches society by encouraging tolerance, creativity, and mutual understanding.", "sentences": ["Cultural diversity refers to the variety of human societies and cultures that exist in the world, each with its own unique set of values, traditions, and ways of life.", "In an increasingly globalized world, understanding and appreciating cultural differences has become more important than ever before.", "One of the most significant benefits of cultural diversity is the richness it brings to social and intellectual life.", "When people from different backgrounds work together, they bring different perspectives and approaches to problem-solving.", "This variety of viewpoints can lead to more creative solutions and better outcomes for businesses and communities alike.", "However, cultural diversity also presents challenges.", "Misunderstandings between people from different cultures are common, often arising from differences in communication styles, values, or social norms.", "For example, what is considered polite behavior in one culture may be seen as rude in another.", "Language barriers can also make communication difficult, even when people share similar goals.", "Education plays a key role in helping people navigate cultural differences.", "Schools and workplaces that teach cultural awareness and sensitivity help reduce prejudice and discrimination.", "Programs that encourage cross-cultural exchange, such as student exchange initiatives and international internships, allow people to develop a first-hand appreciation of different ways of life.", "In conclusion, while cultural diversity can be challenging to navigate, it ultimately enriches society by encouraging tolerance, creativity, and mutual understanding."], "questions": [{"no": 1, "stem": "According to the passage, what is one benefit of cultural diversity?", "opts": {"A": "It eliminates the need for language learning", "B": "It brings different perspectives that lead to creative solutions", "C": "It makes international travel easier", "D": "It reduces competition in the workplace"}, "ans": "B"}, {"no": 2, "stem": "What challenge of cultural diversity does the passage describe?", "opts": {"A": "High cost of cross-cultural programs", "B": "Differences in working hours between cultures", "C": "Misunderstandings arising from different values and communication styles", "D": "Lack of interest in other cultures among young people"}, "ans": "?"}, {"no": 3, "stem": "What does the author say about what seems polite in one culture?", "opts": {"A": "It is usually polite in all cultures", "B": "It may be seen as rude in another culture", "C": "It requires formal language to express", "D": "It depends on the age of the people involved"}, "ans": "?"}, {"no": 4, "stem": "According to the passage, what role does education play?", "opts": {"A": "It replaces cultural exchange programs", "B": "It teaches people to ignore cultural differences", "C": "It helps people navigate cultural differences and reduce prejudice", "D": "It focuses mainly on language learning"}, "ans": "?"}, {"no": 5, "stem": "What is the main message of this passage?", "opts": {"A": "Cultural differences always cause conflict", "B": "Cultural diversity should be reduced through globalization", "C": "Despite challenges, cultural diversity enriches society", "D": "Education alone cannot solve cultural misunderstandings\n\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 7, "title": "Climate Change and Its Global Impact", "body": "Climate change is one of the most urgent challenges facing the world today. Scientists agree that the Earth's average temperature has been rising steadily over the past century, largely as a result of human activities that release greenhouse gases into the atmosphere. These gases trap heat from the sun, causing a gradual warming effect known as the greenhouse effect. The consequences of climate change are wide-ranging and severe. Rising sea levels threaten coastal cities and low-lying islands. Extreme weather events such as floods, droughts, and hurricanes have become more frequent and more intense. Glaciers and polar ice caps are melting at accelerating rates, contributing to sea-level rise and disrupting freshwater supplies for millions of people. Agriculture is also heavily affected. Changes in rainfall patterns and temperature extremes can damage crops and reduce food production, threatening food security in many regions. Wildlife habitats are shrinking as ecosystems struggle to adapt to the pace of change. International cooperation is essential to address climate change. The Paris Agreement, signed by nearly 200 countries in 2015, commits nations to limit global temperature rise and reduce greenhouse gas emissions. However, progress has been uneven, and many experts argue that current commitments are insufficient to prevent dangerous levels of warming. Addressing climate change requires not only policy action but also changes in individual behavior, including reducing energy consumption, choosing sustainable transportation, and supporting businesses that adopt environmentally friendly practices.", "sentences": ["Climate change is one of the most urgent challenges facing the world today.", "Scientists agree that the Earth's average temperature has been rising steadily over the past century, largely as a result of human activities that release greenhouse gases into the atmosphere.", "These gases trap heat from the sun, causing a gradual warming effect known as the greenhouse effect.", "The consequences of climate change are wide-ranging and severe.", "Rising sea levels threaten coastal cities and low-lying islands.", "Extreme weather events such as floods, droughts, and hurricanes have become more frequent and more intense.", "Glaciers and polar ice caps are melting at accelerating rates, contributing to sea-level rise and disrupting freshwater supplies for millions of people.", "Agriculture is also heavily affected.", "Changes in rainfall patterns and temperature extremes can damage crops and reduce food production, threatening food security in many regions.", "Wildlife habitats are shrinking as ecosystems struggle to adapt to the pace of change.", "International cooperation is essential to address climate change.", "The Paris Agreement, signed by nearly 200 countries in 2015, commits nations to limit global temperature rise and reduce greenhouse gas emissions.", "However, progress has been uneven, and many experts argue that current commitments are insufficient to prevent dangerous levels of warming.", "Addressing climate change requires not only policy action but also changes in individual behavior, including reducing energy consumption, choosing sustainable transportation, and supporting businesses that adopt environmentally friendly practices."], "questions": [{"no": 1, "stem": "What causes the greenhouse effect according to the passage?", "opts": {"A": "Volcanic activity releasing natural gases", "B": "Human activities releasing greenhouse gases that trap heat", "C": "Changes in the Earth's orbit around the sun", "D": "Natural increases in solar radiation"}, "ans": "B"}, {"no": 2, "stem": "Which is listed as a consequence of rising sea levels?", "opts": {"A": "More frequent earthquakes in coastal areas", "B": "Threats to coastal cities and low-lying islands", "C": "Changes in agricultural growing seasons", "D": "Loss of biodiversity in mountain regions"}, "ans": "?"}, {"no": 3, "stem": "How does climate change affect agriculture?", "opts": {"A": "By creating more favorable growing conditions", "B": "By causing changes in rainfall and temperature that reduce food production", "C": "By increasing the availability of freshwater for irrigation", "D": "By reducing competition between crops"}, "ans": "?"}, {"no": 4, "stem": "What is said about the Paris Agreement?", "opts": {"A": "It has been signed only by wealthy nations", "B": "It was rejected by most countries", "C": "It commits nations to limit warming and reduce emissions, though progress is uneven", "D": "It focuses only on protecting ocean ecosystems"}, "ans": "?"}, {"no": 5, "stem": "What does the passage say is needed to address climate change?", "opts": {"A": "Only government policies, not individual action", "B": "A complete end to industrial production", "C": "Both policy action and changes in individual behavior", "D": "Focusing solely on developing renewable energy\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 8, "title": "Social Media and Mental Health", "body": "The widespread use of social media has transformed the way people communicate and share information. Platforms such as WeChat, Weibo, and Instagram allow users to stay connected with friends and family, share experiences, and access news and entertainment instantly. However, growing research suggests that excessive use of social media may have negative effects on mental health. Studies have found that heavy social media users are more likely to experience feelings of anxiety, depression, and loneliness. One reason is social comparison, where people measure their own lives against the carefully selected and often idealized images that others post online. This can lead to unrealistic expectations and dissatisfaction with one's own life. Another concern is the impact of social media on sleep. Many people check their phones before bed, and the blue light from screens can interfere with the production of melatonin, a hormone that regulates sleep. Poor sleep quality, in turn, has been linked to a range of physical and mental health problems. Despite these concerns, social media can also have positive effects. It enables people to find communities of support, particularly for those dealing with illness, isolation, or mental health challenges. Online campaigns have successfully raised awareness of important social issues and encouraged people to take action. The key appears to lie in balance. Mental health experts suggest setting daily limits on social media use, focusing on meaningful interactions rather than passive scrolling, and regularly taking digital breaks to reduce dependence on online validation.", "sentences": ["The widespread use of social media has transformed the way people communicate and share information.", "Platforms such as WeChat, Weibo, and Instagram allow users to stay connected with friends and family, share experiences, and access news and entertainment instantly.", "However, growing research suggests that excessive use of social media may have negative effects on mental health.", "Studies have found that heavy social media users are more likely to experience feelings of anxiety, depression, and loneliness.", "One reason is social comparison, where people measure their own lives against the carefully selected and often idealized images that others post online.", "This can lead to unrealistic expectations and dissatisfaction with one's own life.", "Another concern is the impact of social media on sleep.", "Many people check their phones before bed, and the blue light from screens can interfere with the production of melatonin, a hormone that regulates sleep.", "Poor sleep quality, in turn, has been linked to a range of physical and mental health problems.", "Despite these concerns, social media can also have positive effects.", "It enables people to find communities of support, particularly for those dealing with illness, isolation, or mental health challenges.", "Online campaigns have successfully raised awareness of important social issues and encouraged people to take action.", "The key appears to lie in balance.", "Mental health experts suggest setting daily limits on social media use, focusing on meaningful interactions rather than passive scrolling, and regularly taking digital breaks to reduce dependence on online validation."], "questions": [{"no": 1, "stem": "What does growing research suggest about excessive social media use?", "opts": {"A": "It has no effect on mental health", "B": "It may cause negative effects on mental health", "C": "It always leads to improved communication skills", "D": "It reduces feelings of loneliness in all users"}, "ans": "B"}, {"no": 2, "stem": "What is social comparison as described in the passage?", "opts": {"A": "Comparing product prices across different websites", "B": "Measuring one's life against idealized images posted by others", "C": "Checking how many followers one has compared to friends", "D": "Comparing news from different social media platforms"}, "ans": "?"}, {"no": 3, "stem": "How does social media affect sleep?", "opts": {"A": "It improves sleep by providing relaxing content", "B": "Blue light from screens interferes with melatonin production", "C": "Social media use before bed has no proven effect", "D": "It causes people to sleep too much during the day"}, "ans": "?"}, {"no": 4, "stem": "What positive effect of social media does the passage mention?", "opts": {"A": "It replaces the need for face-to-face therapy", "B": "It eliminates feelings of loneliness permanently", "C": "It enables people to find communities of support", "D": "It automatically reduces screen time"}, "ans": "?"}, {"no": 5, "stem": "What do mental health experts suggest?", "opts": {"A": "Avoiding all social media permanently", "B": "Only using social media for professional purposes", "C": "Setting limits, focusing on meaningful interactions, and taking digital breaks", "D": "Replacing social media with traditional media\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 9, "title": "Food Safety in Modern Society", "body": "Food safety is a growing concern in modern society. As food production has become more industrialized and supply chains have grown longer and more complex, ensuring the safety and quality of the food we eat has become an increasingly difficult challenge. Contamination can occur at many points in the food production process, from the farm to the processing plant to the retail store. Common sources of contamination include harmful bacteria such as salmonella and E. coli, chemical residues from pesticides and fertilizers, and improper handling or storage during transportation. When contaminated food reaches consumers, it can cause serious illnesses ranging from mild digestive problems to life- threatening conditions. Governments around the world have responded by introducing food safety regulations and inspection systems. In China, the Food Safety Law, revised in 2015, sets strict standards for food production and requires companies to trace the origin of their products. Online food delivery platforms and imported goods have added new layers of complexity to enforcement. Consumers can also take steps to protect themselves. Washing fruit and vegetables thoroughly, cooking meat to safe internal temperatures, checking expiry dates, and storing food correctly all reduce the risk of foodborne illness. Being aware of product recalls and choosing reputable suppliers are also important practices. Food safety is ultimately a shared responsibility involving governments, producers, retailers, and consumers. Maintaining public trust in the food supply requires vigilance at every level of the system.", "sentences": ["Food safety is a growing concern in modern society.", "As food production has become more industrialized and supply chains have grown longer and more complex, ensuring the safety and quality of the food we eat has become an increasingly difficult challenge.", "Contamination can occur at many points in the food production process, from the farm to the processing plant to the retail store.", "Common sources of contamination include harmful bacteria such as salmonella and E.", "coli, chemical residues from pesticides and fertilizers, and improper handling or storage during transportation.", "When contaminated food reaches consumers, it can cause serious illnesses ranging from mild digestive problems to life- threatening conditions.", "Governments around the world have responded by introducing food safety regulations and inspection systems.", "In China, the Food Safety Law, revised in 2015, sets strict standards for food production and requires companies to trace the origin of their products.", "Online food delivery platforms and imported goods have added new layers of complexity to enforcement.", "Consumers can also take steps to protect themselves.", "Washing fruit and vegetables thoroughly, cooking meat to safe internal temperatures, checking expiry dates, and storing food correctly all reduce the risk of foodborne illness.", "Being aware of product recalls and choosing reputable suppliers are also important practices.", "Food safety is ultimately a shared responsibility involving governments, producers, retailers, and consumers.", "Maintaining public trust in the food supply requires vigilance at every level of the system."], "questions": [{"no": 1, "stem": "What has made food safety more challenging in modern society?", "opts": {"A": "A decrease in the number of farms", "B": "Longer and more complex food supply chains", "C": "The introduction of stricter food safety laws", "D": "Increased consumer demand for organic food"}, "ans": "B"}, {"no": 2, "stem": "Which is listed as a common source of food contamination?", "opts": {"A": "Natural weather conditions", "B": "Poor restaurant design", "C": "Chemical residues from pesticides", "D": "Transportation delays"}, "ans": "?"}, {"no": 3, "stem": "What does China's Food Safety Law require companies to do?", "opts": {"A": "Use only domestic ingredients", "B": "Submit annual financial reports", "C": "Trace the origin of their products", "D": "Sell food only through approved retailers"}, "ans": "?"}, {"no": 4, "stem": "Which consumer action is mentioned as reducing risk of foodborne illness?", "opts": {"A": "Choosing only organic food", "B": "Avoiding all packaged products", "C": "Washing fruit and vegetables thoroughly", "D": "Refusing imported food products"}, "ans": "?"}, {"no": 5, "stem": "According to the passage, food safety is ultimately:", "opts": {"A": "Only the government's responsibility", "B": "Only the responsibility of food producers", "C": "A shared responsibility among many parties", "D": "Dependent solely on consumer choices\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 10, "title": "Career Development in the Digital Age", "body": "The rapid development of digital technology has fundamentally changed the nature of work and the skills required for career success. Jobs that did not exist a decade ago are now among the most in-demand, and many traditional roles are being transformed or replaced by automation and artificial intelligence. In this environment, adaptability has become one of the most valued qualities in the workforce. Employers increasingly seek workers who can learn new skills quickly, embrace change, and work effectively in cross-functional teams. Technical skills such as data analysis, programming, and digital marketing have become highly sought after across nearly all industries. Equally important are soft skills, which include communication, critical thinking, creativity, and emotional intelligence. These human capabilities are difficult to automate and remain essential for roles that involve leadership, negotiation, and complex decision- making. Research consistently shows that a combination of technical and soft skills is the strongest predictor of long-term career success. Continuous learning is now a career necessity rather than an optional extra. Many professionals invest in online courses, professional certifications, and industry conferences to keep their skills current. Employers who provide learning and development opportunities tend to have higher employee retention rates and more innovative cultures. The career path of the future is unlikely to be a straight line. Most people will change roles, industries, and even careers multiple times during their working lives. Building a diverse portfolio of experiences and skills provides the flexibility needed to navigate this changing landscape successfully.", "sentences": ["The rapid development of digital technology has fundamentally changed the nature of work and the skills required for career success.", "Jobs that did not exist a decade ago are now among the most in-demand, and many traditional roles are being transformed or replaced by automation and artificial intelligence.", "In this environment, adaptability has become one of the most valued qualities in the workforce.", "Employers increasingly seek workers who can learn new skills quickly, embrace change, and work effectively in cross-functional teams.", "Technical skills such as data analysis, programming, and digital marketing have become highly sought after across nearly all industries.", "Equally important are soft skills, which include communication, critical thinking, creativity, and emotional intelligence.", "These human capabilities are difficult to automate and remain essential for roles that involve leadership, negotiation, and complex decision- making.", "Research consistently shows that a combination of technical and soft skills is the strongest predictor of long-term career success.", "Continuous learning is now a career necessity rather than an optional extra.", "Many professionals invest in online courses, professional certifications, and industry conferences to keep their skills current.", "Employers who provide learning and development opportunities tend to have higher employee retention rates and more innovative cultures.", "The career path of the future is unlikely to be a straight line.", "Most people will change roles, industries, and even careers multiple times during their working lives.", "Building a diverse portfolio of experiences and skills provides the flexibility needed to navigate this changing landscape successfully."], "questions": [{"no": 1, "stem": "What quality does the passage identify as increasingly valued in the digital age?", "opts": {"A": "Physical fitness", "B": "Adaptability", "C": "Seniority", "D": "Traditional qualifications"}, "ans": "B"}, {"no": 2, "stem": "Which technical skill is mentioned as highly sought after?", "opts": {"A": "Manual record-keeping", "B": "Factory production management", "C": "Data analysis and programming", "D": "Traditional accounting methods"}, "ans": "?"}, {"no": 3, "stem": "Why are soft skills important according to the passage?", "opts": {"A": "They replace the need for technical training", "B": "They are difficult to automate and essential for leadership and decision-making", "C": "They are more important than any technical skill", "D": "Employers only value soft skills in creative industries"}, "ans": "?"}, {"no": 4, "stem": "What does the passage say about continuous learning?", "opts": {"A": "It is only necessary for entry-level workers", "B": "It has become a career necessity", "C": "It is mainly offered by universities", "D": "It is less important than work experience"}, "ans": "?"}, {"no": 5, "stem": "What does the passage suggest about future career paths?", "opts": {"A": "They will become simpler and more predictable", "B": "Most people will stay in one career for their entire working life", "C": "People will change roles and industries multiple times", "D": "Digital technology will eliminate the need for career planning\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 11, "title": "The Psychology of Motivation", "body": "Motivation is the internal force that drives people to pursue goals, overcome obstacles, and persist in the face of difficulty. Understanding what motivates people has been a central concern of psychologists for decades, and the research has important implications for education, management, and personal development. Psychologists generally distinguish between two types of motivation: intrinsic and extrinsic. Intrinsic motivation refers to doing something because it is inherently interesting or enjoyable, while extrinsic motivation involves doing something to gain external rewards or avoid punishment. Research consistently shows that intrinsic motivation is more powerful and long-lasting, producing higher quality work and greater personal satisfaction. One influential theory, developed by Abraham Maslow, proposes that human needs are arranged in a hierarchy. Basic physiological needs such as food and shelter must be met before higher needs, including safety, belonging, self-esteem, and ultimately self-actualization, can be pursued. This model helps explain why people who struggle to meet basic needs find it difficult to focus on personal growth and achievement. Another key concept is self-efficacy, developed by Albert Bandura, which refers to a person's belief in their own ability to succeed in specific situations. People with high self-efficacy are more likely to take on challenges, persist through difficulty, and achieve their goals. Self-efficacy can be strengthened through small successes, positive feedback, and exposure to role models who have overcome similar challenges. Understanding motivation allows educators and managers to create environments that support people's natural drive to learn and grow, rather than relying solely on external rewards.", "sentences": ["Motivation is the internal force that drives people to pursue goals, overcome obstacles, and persist in the face of difficulty.", "Understanding what motivates people has been a central concern of psychologists for decades, and the research has important implications for education, management, and personal development.", "Psychologists generally distinguish between two types of motivation: intrinsic and extrinsic.", "Intrinsic motivation refers to doing something because it is inherently interesting or enjoyable, while extrinsic motivation involves doing something to gain external rewards or avoid punishment.", "Research consistently shows that intrinsic motivation is more powerful and long-lasting, producing higher quality work and greater personal satisfaction.", "One influential theory, developed by Abraham Maslow, proposes that human needs are arranged in a hierarchy.", "Basic physiological needs such as food and shelter must be met before higher needs, including safety, belonging, self-esteem, and ultimately self-actualization, can be pursued.", "This model helps explain why people who struggle to meet basic needs find it difficult to focus on personal growth and achievement.", "Another key concept is self-efficacy, developed by Albert Bandura, which refers to a person's belief in their own ability to succeed in specific situations.", "People with high self-efficacy are more likely to take on challenges, persist through difficulty, and achieve their goals.", "Self-efficacy can be strengthened through small successes, positive feedback, and exposure to role models who have overcome similar challenges.", "Understanding motivation allows educators and managers to create environments that support people's natural drive to learn and grow, rather than relying solely on external rewards."], "questions": [{"no": 1, "stem": "What is intrinsic motivation according to the passage?", "opts": {"A": "Motivation driven by external rewards", "B": "Motivation arising from genuine interest or enjoyment", "C": "Motivation based on avoiding punishment", "D": "Motivation created by social pressure"}, "ans": "B"}, {"no": 2, "stem": "What does research show about intrinsic vs. extrinsic motivation?", "opts": {"A": "Extrinsic motivation produces better long-term results", "B": "Both types produce equally good results", "C": "Intrinsic motivation is more powerful and long-lasting", "D": "Extrinsic motivation is more common in educational settings"}, "ans": "?"}, {"no": 3, "stem": "What does Maslow's hierarchy of needs suggest?", "opts": {"A": "All needs have equal priority", "B": "Self-actualization is the most basic need", "C": "Basic needs must be met before higher needs can be pursued", "D": "Economic security is the most important human need"}, "ans": "?"}, {"no": 4, "stem": "What is self-efficacy according to the passage?", "opts": {"A": "A person's natural intelligence level", "B": "A person's belief in their ability to succeed in specific situations", "C": "A system for measuring academic performance", "D": "A type of external reward that improves performance"}, "ans": "?"}, {"no": 5, "stem": "What can strengthen self-efficacy?", "opts": {"A": "Avoiding all difficult challenges", "B": "Receiving only negative feedback to build resilience", "C": "Small successes, positive feedback, and role models", "D": "Memorizing motivational theories\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 12, "title": "The Sharing Economy", "body": "The sharing economy is a business model in which individuals share access to goods, services, or skills, typically facilitated by online platforms. Companies such as Airbnb, Didi, and various ride-sharing and tool-lending services have made the sharing economy a significant part of modern commerce. The core idea is that resources that are underutilized can be made available to others, reducing waste and providing economic opportunities for individuals. For consumers, the sharing economy often offers cheaper and more convenient alternatives to traditional services. Travelers can rent a private room instead of a hotel; commuters can share rides instead of driving alone; freelancers can offer their skills to clients worldwide. This flexibility appeals to people who value choice and cost savings. However, the sharing economy has also attracted criticism. Critics point out that platform companies often avoid the regulatory requirements faced by traditional businesses. For example, ride-sharing services may not be subject to the same safety inspections or licensing requirements as taxi companies. Workers in the sharing economy frequently lack job security, benefits, and legal protections. Privacy is another concern. Sharing economy platforms collect and store large amounts of personal data, raising questions about data security and how this information is used. Despite these challenges, the sharing economy continues to grow globally. Regulators are gradually developing new frameworks to address the unique challenges it presents, aiming to balance innovation with consumer protection and fair labor standards.", "sentences": ["The sharing economy is a business model in which individuals share access to goods, services, or skills, typically facilitated by online platforms.", "Companies such as Airbnb, Didi, and various ride-sharing and tool-lending services have made the sharing economy a significant part of modern commerce.", "The core idea is that resources that are underutilized can be made available to others, reducing waste and providing economic opportunities for individuals.", "For consumers, the sharing economy often offers cheaper and more convenient alternatives to traditional services.", "Travelers can rent a private room instead of a hotel; commuters can share rides instead of driving alone; freelancers can offer their skills to clients worldwide.", "This flexibility appeals to people who value choice and cost savings.", "However, the sharing economy has also attracted criticism.", "Critics point out that platform companies often avoid the regulatory requirements faced by traditional businesses.", "For example, ride-sharing services may not be subject to the same safety inspections or licensing requirements as taxi companies.", "Workers in the sharing economy frequently lack job security, benefits, and legal protections.", "Privacy is another concern.", "Sharing economy platforms collect and store large amounts of personal data, raising questions about data security and how this information is used.", "Despite these challenges, the sharing economy continues to grow globally.", "Regulators are gradually developing new frameworks to address the unique challenges it presents, aiming to balance innovation with consumer protection and fair labor standards."], "questions": [{"no": 1, "stem": "What is the sharing economy based on?", "opts": {"A": "Government redistribution of public resources", "B": "Individuals sharing access to goods and services through online platforms", "C": "Companies sharing profits with their employees", "D": "International trade of shared commodities"}, "ans": "B"}, {"no": 2, "stem": "What does the passage say consumers get from the sharing economy?", "opts": {"A": "More complex services than traditional providers", "B": "Cheaper and more convenient alternatives to traditional services", "C": "Better legal protections as consumers", "D": "Guaranteed quality standards from all providers"}, "ans": "?"}, {"no": 3, "stem": "What criticism of sharing economy workers does the passage mention?", "opts": {"A": "They earn too much compared to traditional workers", "B": "They work too many hours due to high demand", "C": "They often lack job security, benefits, and legal protections", "D": "They are required to pay high platform fees"}, "ans": "?"}, {"no": 4, "stem": "What privacy concern does the passage raise?", "opts": {"A": "Users are required to share too much personal information publicly", "B": "Platforms collect large amounts of personal data, raising security questions", "C": "Traditional businesses misuse customer data", "D": "Sharing economy services do not protect users from identity theft"}, "ans": "?"}, {"no": 5, "stem": "What are regulators doing about the sharing economy?", "opts": {"A": "Banning all sharing economy platforms in major markets", "B": "Forcing all sharing platforms to become traditional companies", "C": "Developing new frameworks to balance innovation with protection", "D": "Ignoring sharing economy issues until they cause major problems\n\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 13, "title": "The Value of Scientific Research", "body": "Scientific research is the systematic process of investigating questions about the natural world in order to advance human knowledge and solve practical problems. From developing new medicines to improving agricultural yields to understanding the origins of the universe, science has transformed every aspect of human life. Basic research, sometimes called pure or fundamental research, aims to expand knowledge without immediate practical application. While the benefits of basic research may not be immediately obvious, history has shown that many breakthrough technologies began as seemingly abstract discoveries. The structure of DNA, discovered through basic research in the 1950s, eventually led to advances in medicine, genetics, and forensic science that affect millions of lives today. Applied research, in contrast, focuses directly on solving specific practical problems. Medical trials testing new drugs, engineering projects developing cleaner energy sources, and agricultural studies finding ways to produce more food with fewer resources are all examples of applied research. Governments and businesses tend to invest more heavily in applied research because the potential return on investment is more direct and measurable. The scientific process relies on rigorous methodology, peer review, and the willingness to revise conclusions when new evidence emerges. These qualities make science a reliable foundation for decision-making in health, policy, and technology. Investing in scientific research is investing in the future. Countries that prioritize scientific education and research tend to enjoy stronger economies, better public health outcomes, and greater capacity to address national and global challenges.", "sentences": ["Scientific research is the systematic process of investigating questions about the natural world in order to advance human knowledge and solve practical problems.", "From developing new medicines to improving agricultural yields to understanding the origins of the universe, science has transformed every aspect of human life.", "Basic research, sometimes called pure or fundamental research, aims to expand knowledge without immediate practical application.", "While the benefits of basic research may not be immediately obvious, history has shown that many breakthrough technologies began as seemingly abstract discoveries.", "The structure of DNA, discovered through basic research in the 1950s, eventually led to advances in medicine, genetics, and forensic science that affect millions of lives today.", "Applied research, in contrast, focuses directly on solving specific practical problems.", "Medical trials testing new drugs, engineering projects developing cleaner energy sources, and agricultural studies finding ways to produce more food with fewer resources are all examples of applied research.", "Governments and businesses tend to invest more heavily in applied research because the potential return on investment is more direct and measurable.", "The scientific process relies on rigorous methodology, peer review, and the willingness to revise conclusions when new evidence emerges.", "These qualities make science a reliable foundation for decision-making in health, policy, and technology.", "Investing in scientific research is investing in the future.", "Countries that prioritize scientific education and research tend to enjoy stronger economies, better public health outcomes, and greater capacity to address national and global challenges."], "questions": [{"no": 1, "stem": "What is basic research aimed at?", "opts": {"A": "Solving specific industrial problems", "B": "Developing new commercial products", "C": "Expanding knowledge without immediate practical application", "D": "Training scientists for applied research roles"}, "ans": "C"}, {"no": 2, "stem": "What does the passage say about DNA research?", "opts": {"A": "It was conducted primarily for medical purposes from the start", "B": "It was initially basic research that led to many practical advances", "C": "It has had little real impact on everyday life", "D": "It was funded entirely by government programs"}, "ans": "?"}, {"no": 3, "stem": "What is applied research focused on?", "opts": {"A": "Abstract theories about the natural world", "B": "Long-term philosophical questions", "C": "Solving specific practical problems", "D": "Increasing university enrollment in science"}, "ans": "?"}, {"no": 4, "stem": "What makes science a reliable foundation for decision-making?", "opts": {"A": "It is funded by governments and businesses", "B": "Its reliance on rigorous methodology, peer review, and willingness to revise\nconclusions", "C": "The large number of scientists working in the field", "D": "Its focus on only proven, historical knowledge"}, "ans": "?"}, {"no": 5, "stem": "What does the passage suggest about countries that invest in science?", "opts": {"A": "They spend too much on research and neglect social services", "B": "They tend to have stronger economies and better public health", "C": "They focus only on technology and ignore environmental issues", "D": "They are more likely to experience rapid population growth\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 14, "title": "Work-Life Balance in the Modern World", "body": "Work-life balance refers to the equilibrium between professional responsibilities and personal life, including time for family, health, hobbies, and rest. In recent decades, as technology has made it easier to work outside traditional office hours, many people have found this balance increasingly difficult to maintain. The consequences of poor work-life balance are well-documented. Chronic overwork leads to burnout, a state of physical and emotional exhaustion that reduces productivity and increases the risk of health problems. Relationships suffer when work consistently takes priority over personal time. Children of parents who work excessive hours may receive less attention and emotional support at critical stages of development. Flexible working arrangements have emerged as one response to this challenge. Many companies now allow employees to adjust their hours, work from home, or compress their working week. These arrangements can significantly improve employee well-being and job satisfaction, while also reducing commuting time and costs. Cultural attitudes toward work also play an important role. In some workplace cultures, working long hours is seen as a sign of dedication and commitment, while taking leave or leaving work on time is viewed negatively. Changing these attitudes requires leadership commitment and clear signals from management that employee well-being is a priority. Ultimately, work-life balance is not a fixed state but an ongoing process of adjustment that changes with life circumstances. Setting boundaries, prioritizing self-care, and communicating needs openly with employers are all strategies that support a healthier balance over the long term.", "sentences": ["Work-life balance refers to the equilibrium between professional responsibilities and personal life, including time for family, health, hobbies, and rest.", "In recent decades, as technology has made it easier to work outside traditional office hours, many people have found this balance increasingly difficult to maintain.", "The consequences of poor work-life balance are well-documented.", "Chronic overwork leads to burnout, a state of physical and emotional exhaustion that reduces productivity and increases the risk of health problems.", "Relationships suffer when work consistently takes priority over personal time.", "Children of parents who work excessive hours may receive less attention and emotional support at critical stages of development.", "Flexible working arrangements have emerged as one response to this challenge.", "Many companies now allow employees to adjust their hours, work from home, or compress their working week.", "These arrangements can significantly improve employee well-being and job satisfaction, while also reducing commuting time and costs.", "Cultural attitudes toward work also play an important role.", "In some workplace cultures, working long hours is seen as a sign of dedication and commitment, while taking leave or leaving work on time is viewed negatively.", "Changing these attitudes requires leadership commitment and clear signals from management that employee well-being is a priority.", "Ultimately, work-life balance is not a fixed state but an ongoing process of adjustment that changes with life circumstances.", "Setting boundaries, prioritizing self-care, and communicating needs openly with employers are all strategies that support a healthier balance over the long term."], "questions": [{"no": 1, "stem": "What has made work-life balance more difficult in recent decades?", "opts": {"A": "Longer commuting distances", "B": "Technology making it easier to work outside office hours", "C": "Increasing competition for jobs", "D": "Reduced vacation entitlements"}, "ans": "B"}, {"no": 2, "stem": "What is burnout according to the passage?", "opts": {"A": "A minor work-related stress condition", "B": "A physical and emotional exhaustion caused by chronic overwork", "C": "A medical condition caused by lack of sleep", "D": "A negative attitude toward one's career"}, "ans": "?"}, {"no": 3, "stem": "How do flexible working arrangements help?", "opts": {"A": "They increase working hours, improving productivity", "B": "They eliminate the need for office spaces", "C": "They can improve well-being, satisfaction, and reduce commuting", "D": "They make it easier for managers to track employee performance"}, "ans": "?"}, {"no": 4, "stem": "What cultural attitude problem does the passage describe?", "opts": {"A": "Employees taking too many breaks during working hours", "B": "Working long hours being seen as dedication, while leaving on time is viewed\nnegatively", "C": "Managers refusing to allow flexible working", "D": "Workers not understanding the importance of productivity"}, "ans": "?"}, {"no": 5, "stem": "What does the author say about work-life balance?", "opts": {"A": "It is a fixed goal that once achieved requires no further effort", "B": "It is an ongoing process of adjustment that changes with circumstances", "C": "It only matters for employees with children", "D": "It can only be achieved through government regulation\n─────────────────────────────────────────────"}, "ans": "?"}]}, {"no": 15, "title": "Tourism and Its Economic Impact", "body": "Tourism is one of the world's largest and most rapidly growing industries. Millions of people travel internationally and domestically each year for leisure, business, and cultural exchange. The tourism industry generates employment, stimulates local economies, and provides governments with significant tax revenues. In many developing countries, tourism has become a primary source of foreign income. Regions that attract large numbers of visitors benefit from investment in infrastructure such as hotels, transport networks, and entertainment facilities. Local artisans, restaurants, and service providers can earn a living by catering to the needs of tourists. However, tourism also carries significant risks. Over-tourism, where destinations are overwhelmed by visitor numbers, can damage the natural environment, raise local living costs, and erode cultural heritage. Popular historical sites have suffered from the effects of large crowds, pollution, and the commercialization of local traditions. Sustainable tourism aims to address these challenges by encouraging visitors to respect local cultures and natural environments, while distributing economic benefits more equitably among local communities. Ecotourism, which focuses on experiencing natural environments with minimal impact, has grown significantly in recent years as travelers have become more environmentally conscious. Governments and tourism authorities play a key role in managing the impact of tourism through policies such as visitor caps, protected area management, and investment in infrastructure that can handle growing visitor numbers without damaging the environment.", "sentences": ["Tourism is one of the world's largest and most rapidly growing industries.", "Millions of people travel internationally and domestically each year for leisure, business, and cultural exchange.", "The tourism industry generates employment, stimulates local economies, and provides governments with significant tax revenues.", "In many developing countries, tourism has become a primary source of foreign income.", "Regions that attract large numbers of visitors benefit from investment in infrastructure such as hotels, transport networks, and entertainment facilities.", "Local artisans, restaurants, and service providers can earn a living by catering to the needs of tourists.", "However, tourism also carries significant risks.", "Over-tourism, where destinations are overwhelmed by visitor numbers, can damage the natural environment, raise local living costs, and erode cultural heritage.", "Popular historical sites have suffered from the effects of large crowds, pollution, and the commercialization of local traditions.", "Sustainable tourism aims to address these challenges by encouraging visitors to respect local cultures and natural environments, while distributing economic benefits more equitably among local communities.", "Ecotourism, which focuses on experiencing natural environments with minimal impact, has grown significantly in recent years as travelers have become more environmentally conscious.", "Governments and tourism authorities play a key role in managing the impact of tourism through policies such as visitor caps, protected area management, and investment in infrastructure that can handle growing visitor numbers without damaging the environment."], "questions": [{"no": 1, "stem": "What does the passage identify as a benefit of tourism?", "opts": {"A": "It reduces the population of tourist destinations", "B": "It eliminates the need for international trade", "C": "It generates employment and stimulates local economies", "D": "It reduces government spending on infrastructure"}, "ans": "C"}, {"no": 2, "stem": "How has tourism benefited developing countries?", "opts": {"A": "By providing free technology transfers", "B": "As a primary source of foreign income and infrastructure investment", "C": "By reducing dependence on agricultural production", "D": "By attracting skilled workers from developed countries"}, "ans": "?"}, {"no": 3, "stem": "What is over-tourism?", "opts": {"A": "A strategy for attracting more visitors to underdeveloped regions", "B": "When destinations are overwhelmed by visitor numbers", "C document.getElementById('list-cards').innerHTML = ARTS.map(a => `

/* ---- 打开单篇 ---- */
function openArt(no) {
  const a = ARTS.find(x => x.no === no);
  if (!a) return;
  curArt = no;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('art-view').style.display  = 'block';
  document.getElementById('nav-back').style.display  = 'inline-flex';
  document.getElementById('nav-home').style.display  = 'none';
  document.getElementById('nav-title').textContent   = '第' + no + '篇';
  document.getElementById('nav-count').textContent   = a.questions.length + '题';
  window.scrollTo(0, 0);

  // 正文：每句包一个可点击span
  const sents = a.body.match(/[^.!?]+[.!?]+/g) || [a.body];
  const bodyHtml = sents.map(s =>
    `<span class="sent-span" onclick="speakSent(this)">${esc(s.trim())} </span>`
  ).join('');

  // 题目
  const qHtml = a.questions.map(q => `
<div class="q-block" data-art="${a.no}" data-qno="${q.no}" data-correct="${esc(q.ans)}">
  <div class="q-stem">${q.no}. ${esc(q.stem)}</div>
  <div class="q-opts">
    ${Object.entries(q.opts).map(([l,v]) => `
    <div class="q-opt" data-letter="${l}"
      onclick="chooseOpt(this,${a.no},${q.no},'${l}','${esc(q.ans)}')">
      <strong>${l}.</strong> ${esc(v)}
    </div>`).join('')}
  </div>
</div>`).join('');

  document.getElementById('art-content').innerHTML = `
<div style="margin-bottom:8px">
  <span class="article-tag">第 ${a.no} 篇</span>
  <span style="font-size:12px;color:var(--sub)">点击正文句子可朗读（使用浏览器语音）</span>

<div class="card" style="margin-bottom:12px">
  <h2 style="font-size:16px;font-weight:800;margin-bottom:12px;color:var(--brand)">${esc(a.title)}</h2>

</div>

<div style="font-size:14px;font-weight:700;color:var(--ink);padding:4px 0 8px">

</div>`;
}

/* ---- 返回列表 ---- */
function goList() {

  document.getElementById('art-view').style.display  = 'none';
  document.getElementById('nav-back').style.display  = 'none';
  document.getElementById('nav-home').style.display  = 'inline-flex';
