<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>词汇点读 · 学位英语</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <a href="start.html" class="nav-back">&#8592;</a>
  <span class="nav-title">📖 词汇点读</span>
  <span class="nav-count" id="nc">加载中</span>
</nav>

<div class="bar">
  <div class="module-switch" id="moduleSwitch">
    <button class="module-tab" data-module="basic" onclick="setModule('basic')">基础必会词300</button>
    <button class="module-tab" data-module="core" onclick="setModule('core')">核心提分词500</button>
    <button class="module-tab" data-module="rt" onclick="setModule('rt')">阅读翻译词300</button>
  </div>
  <div class="module-note" id="moduleNote"></div>
  <input class="search" id="q" type="search" placeholder="搜索单词 / 中文释义 / 搭配 / 例句" oninput="filterVocab()">
  <div class="letters" id="letters"></div>
</div>

<main id="app"></main>

<footer class="legal-note">
  本系统为安徽成人本科/高等学历继续教育学位英语备考点读资料，仅供学生学习使用。考试政策、考试安排、题型要求以安徽继续教育公共英语联盟及各高校继续教育学院最新通知为准。本系统不含泄露真题，不承诺包过，不声称官方授权。
</footer>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script src="js/vocabulary-data.js"></script>
<script>
const MODULES = {
  basic: {
    dataKey: 'basic',
    title: '基础必会词300',
    shortTitle: '基础必会词',
    planned: 300,
    note: '保留原有 300 个基础必会词，继续使用原本地单词和例句音频。'
  },
  core: {
    dataKey: 'core',
    title: '核心提分词500',
    shortTitle: '核心提分词',
    planned: 500,
    note: '当前已上线第一批 100 个核心提分词，后续确认可用后继续扩展至 500。'
  },
  rt: {
    dataKey: 'readingTranslation',
    title: '阅读翻译高频词300',
    shortTitle: '阅读翻译词',
    planned: 300,
    note: '阅读翻译高频词 300 将在下一批扩展；当前先完成核心提分词前 100 个上线验证。'
  }
};

let activeModule = new URLSearchParams(location.search).get('module') || 'basic';
if (!MODULES[activeModule]) activeModule = 'basic';
let letter = '全部';
let kw = '';

function setModule(key) {
  if (!MODULES[key]) return;
  activeModule = key;
  letter = '全部';
  kw = '';
  document.getElementById('q').value = '';
  const url = new URL(location.href);
  url.searchParams.set('module', key);
  history.replaceState(null, '', url);
  renderTabs();
  renderLetters();
  render();
}

function getAllWords() {
  const data = window.VOCAB_DATA || {};
  return data[MODULES[activeModule].dataKey] || [];
}

function renderTabs() {
  document.querySelectorAll('.module-tab').forEach(btn => {
    const isOn = btn.dataset.module === activeModule;
    btn.classList.toggle('on', isOn);
    btn.setAttribute('aria-pressed', isOn ? 'true' : 'false');
  });
  document.getElementById('moduleNote').textContent = MODULES[activeModule].note;
}

function renderLetters() {
  const words = getAllWords();
  const labels = ['全部', ...[...new Set(words.map(w => w.word[0].toUpperCase()))].sort()];
  document.getElementById('letters').innerHTML = labels.map(l =>
    `<span class="lt${l === letter ? ' on' : ''}" data-l="${l}" onclick="setLetter(this,'${l}')">${l}</span>`
  ).join('');
}

function setLetter(el, l) {
  document.querySelectorAll('.lt').forEach(x => x.classList.remove('on'));
  el.classList.add('on');
  letter = l;
  render();
}

function filterVocab() {
  kw = document.getElementById('q').value.trim();
  render();
}

function audioPath(item, type) {
  const [prefix, num] = item.id.split('_');
  if (prefix === 'basic') return type === 'word' ? `audio/w_${num}.mp3` : `audio/s_${num}.mp3`;
  if (prefix === 'core') return type === 'word' ? `audio/core_word_${num}.mp3` : `audio/core_sentence_${num}.mp3`;
  if (prefix === 'rt') return type === 'word' ? `audio/rt_word_${num}.mp3` : `audio/rt_sentence_${num}.mp3`;
  return '';
}

function searchableText(item) {
  return [
    item.word,
    item.meaning,
    item.collocation,
    item.example,
    item.translation,
    item.level
  ].join(' ').toLowerCase();
}

function render() {
  const all = getAllWords();
  const mod = MODULES[activeModule];
  let list = all.slice();
  if (letter !== '全部') list = list.filter(w => w.word[0].toUpperCase() === letter);
  if (kw) {
    const key = kw.toLowerCase();
    list = list.filter(w => searchableText(w).includes(key));
  }

  const totalLabel = all.length === mod.planned ? `${all.length} 词` : `${all.length}/${mod.planned} 词`;
  document.getElementById('nc').textContent = totalLabel;

  if (!all.length) {
    document.getElementById('app').innerHTML = `
      <div class="card empty-card">
        <div class="empty-title">${esc(mod.title)}</div>
        <div class="empty-text">${esc(mod.note)}</div>
      </div>`;
    return;
  }

  document.getElementById('app').innerHTML =
    `<div class="count">${esc(mod.title)}：当前显示 ${list.length} / ${all.length} 词</div>` +
    list.map(item => {
      const no = item.id.split('_')[1];
      const wordAudio = audioPath(item, 'word');
      const sentenceAudio = audioPath(item, 'sentence');
      return `
<div class="card">
  <div class="word-row">
    <span class="wno">${esc(no)}</span>
    <span class="wen">${esc(item.word)}</span>
    <span class="wpron">${esc(item.phonetic)}</span>
    ${item.partOfSpeech ? `<span class="wpos">${esc(item.partOfSpeech)}</span>` : ''}
    <button class="btn btn-w" data-text="${esc(item.word)}" data-audio="${esc(wordAudio)}" onclick="speak(this)">🔊 单词</button>
  </div>
  <div class="wcn">${esc(item.meaning)}</div>
  ${item.collocation ? `<div class="wcollo">搭配：${esc(item.collocation)}</div>` : ''}
  <div class="sent-row">
    <div class="sent-text">
      <div>${esc(item.example)}</div>
      ${item.translation ? `<div class="sent-cn">${esc(item.translation)}</div>` : ''}
    </div>
    <button class="btn btn-s" data-text="${esc(item.example)}" data-audio="${esc(sentenceAudio)}" onclick="speak(this)">🔊 例句</button>
  </div>
</div>`;
    }).join('');
}

renderTabs();
renderLetters();
render();
</script>
</body>
</html>
