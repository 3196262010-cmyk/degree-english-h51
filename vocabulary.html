let letter = '全部', kw = '';

// 字母导航
const L = ['全部', ...[...new Set(WORDS.map(w => w.word[0].toUpperCase()))].sort()];
document.getElementById('letters').innerHTML =
  L.map(l => `<span class="lt${l==='全部'?' on':''}" data-l="${l}" onclick="setL(this,'${l}')">${l}</span>`).join('');

function setL(el, l) {
  document.querySelectorAll('.lt').forEach(x => x.classList.remove('on'));
  el.classList.add('on');
  letter = l;
  render();
}

function filter() { kw = document.getElementById('q').value.trim(); render(); }

function render() {
  let list = WORDS;
  if (letter !== '全部') list = list.filter(w => w.word[0].toUpperCase() === letter);
  if (kw) {
    const k = kw.toLowerCase();
    list = list.filter(w => w.word.toLowerCase().includes(k) || w.cn.includes(kw));
  }
  document.getElementById('nc').textContent = list.length + ' 词';
  document.getElementById('app').innerHTML =
    '<div class="count">共 ' + list.length + ' 词</div>' +
    list.map(w => `
<div class="card">
  <div class="word-row">
    <span class="wno">${w.no}</span>
    <span class="wen">${esc(w.word)}</span>
    <span class="wpron">${esc(w.pron)}</span>
    ${w.pos ? `<span class="wpos">${esc(w.pos)}</span>` : ''}
    <button class="btn btn-w" data-text="${esc(w.word)}" data-audio="${esc(w.wa)}" onclick="speak(this)">🔊 单词</button>
  </div>
  <div class="wcn">${esc(w.cn)}</div>
  ${w.collo ? `<div class="wcollo">搭配：${esc(w.collo)}</div>` : ''}
  <div class="sent-row">
    <div class="sent-text">${esc(w.sent)}</div>
    <button class="btn btn-s" data-text="${esc(w.sent)}" data-audio="${esc(w.sa)}" onclick="speak(this)">🔊 例句</button>
  </div>
</div>`).join('');
}

render();
